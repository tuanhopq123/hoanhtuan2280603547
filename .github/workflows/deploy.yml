name: Build and Push Spring Boot Docker Image

# Kích hoạt workflow mỗi khi có code mới được push lên nhánh main
on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      # Bước 1: Checkout mã nguồn từ GitHub về máy chủ chạy Actions
      - name: Checkout Source Code
        uses: actions/checkout@v4

      # Bước 2: Cài đặt Docker Buildx (công cụ hỗ trợ build image tối ưu)
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Bước 3: Tự động đăng nhập vào Docker Hub sử dụng Secrets đã tạo
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      # Bước 4: Tự động Build từ Dockerfile và Push Image lên Docker Hub
      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          # Gắn tags cho Image: một tag 'latest' và một tag theo mã SHA của commit để dễ quản lý phiên bản
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/springboot-app:latest
            ${{ secrets.DOCKER_USERNAME }}/springboot-app:${{ github.sha }}
